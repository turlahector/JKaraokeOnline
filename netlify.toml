[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://jkaraokeonline.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/elli-game"
  to = "/elli-game.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
